name: Send Broadcast Reminders

on:
  schedule:
    # 8:00 AM Eastern Standard Time = 1:00 PM UTC
    # (If you're on Daylight Saving Time in spring/summer, change 13 to 12)
    - cron: '0 13 * * *'
  workflow_dispatch:  # Manual trigger from GitHub Actions tab — use this to test

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Send reminder emails
        run: node send-reminders.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
